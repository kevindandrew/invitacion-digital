<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo crema con borde dorado -->
  <rect width="32" height="32" rx="6" fill="#FAF8F3"/>
  <rect x="1" y="1" width="30" height="30" rx="5.5" fill="none" stroke="#C4A86A" stroke-width="0.7" opacity="0.6"/>

  <!-- Templo SUD (silueta dorada) -->

  <!-- Base / suelo -->
  <rect x="2"  y="29" width="28" height="2"  rx="1"   fill="#A67C30"/>
  <!-- Escalón inferior -->
  <rect x="3"  y="26" width="26" height="3.5" rx="0.8" fill="#A67C30"/>
  <!-- Escalón medio -->
  <rect x="5"  y="23" width="22" height="3.5" rx="0.7" fill="#A67C30"/>
  <!-- Cuerpo principal -->
  <rect x="7"  y="18" width="18" height="5.5" rx="0.6" fill="#A67C30"/>
  <!-- Nivel superior -->
  <rect x="9"  y="14" width="14" height="4.5" rx="0.5" fill="#A67C30"/>
  <!-- Torre base -->
  <rect x="13" y="9"  width="6"  height="5.5" rx="0.5" fill="#A67C30"/>
  <!-- Torre superior -->
  <rect x="14.2" y="6" width="3.6" height="3.5" rx="0.4" fill="#A67C30"/>
  <!-- Aguja -->
  <polygon points="16,1 14,6.5 18,6.5" fill="#A67C30"/>
  <!-- Ángel Moroni (punto dorado claro en la punta) -->
  <circle cx="16" cy="1.5" r="1.2" fill="#E0C06A"/>

  <!-- Ventanas arco (blancas, en cuerpo principal) -->
  <rect x="9"  y="19.5" width="2.5" height="3.2" rx="1.2" fill="#FAF8F3" opacity="0.5"/>
  <rect x="14.8" y="19.5" width="2.5" height="3.2" rx="1.2" fill="#FAF8F3" opacity="0.5"/>
  <rect x="20.5" y="19.5" width="2.5" height="3.2" rx="1.2" fill="#FAF8F3" opacity="0.5"/>
</svg>
